var STORE = "pf_v4";

function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function daysBetween(d1, d2) {
  try {
    if (!d1) return null;
    var a = new Date(d1), b = d2 ? new Date(d2) : new Date();
    var n = Math.round((b - a) / 86400000);
    return n >= 0 ? n : 0;
  } catch(e) { return null; }
}

function initials(n) {
  return n.split(/[\s\/\-]+/).map(function(w){ return w[0] || ""; }).join("").toUpperCase().slice(0,2);
}

function escH(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

var S = {};
data.forEach(function(p, pi) {
  p.items.forEach(function(it, ii) {
    S[pi+"-"+ii] = { done: it.done, dc: it.done ? (it.dc || todayStr()) : "", note: it.notes || "" };
  });
});

function loadState() {
  try {
    var saved = JSON.parse(localStorage.getItem(STORE) || "{}");
    Object.keys(saved).forEach(function(k) {
      if (S[k]) {
        S[k].done = saved[k].done;
        S[k].dc = saved[k].dc;
        if (saved[k].note !== undefined) S[k].note = saved[k].note;
      }
    });
    var t = localStorage.getItem(STORE + "_time");
    document.getElementById("lbl-date").textContent = "June 1, 2026" + (t ? " — Saved: " + t : "");
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORE, JSON.stringify(S));
    var t = new Date().toLocaleTimeString();
    localStorage.setItem(STORE + "_time", t);
    document.getElementById("lbl-date").textContent = "June 1, 2026 — Saved: " + t;
    var bar = document.getElementById("savebar");
    bar.textContent = "Saved at " + t;
    setTimeout(function(){ bar.textContent = ""; }, 3000);
  } catch(e) {}
}

function updateProg() {
  var t = Object.keys(S).length;
  var d = Object.values(S).filter(function(x){ return x.done; }).length;
  var pct = t ? Math.round(d/t*100) : 0;
  document.getElementById("pf").style.width = pct + "%";
  document.getElementById("pl").textContent = d + " / " + t + " done";
  data.forEach(function(p, pi) {
    var tp = p.items.length, dp = 0;
    p.items.forEach(function(_, ii){ if (S[pi+"-"+ii] && S[pi+"-"+ii].done) dp++; });
    var el = document.getElementById("cnt-" + pi);
    if (!el) return;
    el.textContent = dp + "/" + tp;
    el.className = "cnt" + (dp === tp ? " all" : dp > 0 ? " some" : "");
  });
}

function buildMeta(it, k) {
  var st = S[k] || { done:false, dc:"", note:"" };
  var isDone = st.done, dc = st.dc || it.dc || "", da = it.da || "";
  var days = daysBetween(da, isDone && dc ? dc : null);
  var m = "";
  if (it.who) m += "<span class='tag who'>&#128100; " + escH(it.who) + "</span>";
  if (da) m += "<span class='tag'>Added: " + da + "</span>";
  if (isDone && dc) m += "<span class='tag dc'>&#10003; Closed: " + dc + "</span>";
  if (days !== null) m += "<span class='tag " + (isDone ? "dclose" : "dopen") + "'>" + days + " day" + (days !== 1 ? "s" : "") + (isDone ? " to close" : " open") + "</span>";
  return m;
}

function renderNote(k) {
  var el = document.getElementById("note-" + k);
  if (!el) return;
  var st = S[k] || { note:"" };
  el.innerHTML = "";
  if (st.note) {
    var nd = document.createElement("div");
    nd.className = "note-show";
    nd.textContent = "\uD83D\uDCDD " + st.note;
    nd.addEventListener("click", (function(k){ return function(){ editNote(k); }; })(k));
    el.appendChild(nd);
  } else {
    var btn = document.createElement("button");
    btn.className = "add-note";
    btn.textContent = "+ add note";
    btn.addEventListener("click", (function(k){ return function(){ editNote(k); }; })(k));
    el.appendChild(btn);
  }
}

function editNote(k) {
  var el = document.getElementById("note-" + k);
  if (!el) return;
  var st = S[k] || { note:"" };
  el.innerHTML = "";
  var ta = document.createElement("textarea");
  ta.className = "note-edit";
  ta.id = "ta-" + k;
  ta.placeholder = "Type your note here...";
  ta.value = st.note || "";
  el.appendChild(ta);
  ta.focus();
  ta.addEventListener("blur", (function(k){ return function(){ saveNote(k); }; })(k));
  ta.addEventListener("keydown", (function(k){ return function(e){ if (e.key === "Escape") saveNote(k); }; })(k));
}

function saveNote(k) {
  var ta = document.getElementById("ta-" + k);
  if (!ta) return;
  if (!S[k]) S[k] = { done:false, dc:"", note:"" };
  S[k].note = ta.value.trim();
  saveState();
  renderNote(k);
}

function toggle(pi, ii) {
  var k = pi + "-" + ii;
  var st = S[k];
  st.done = !st.done;
  st.dc = st.done ? todayStr() : "";
  document.getElementById("cb-" + k).className = "cb" + (st.done ? " on" : "");
  document.getElementById("tx-" + k).className = "it" + (st.done ? " done" : "");
  document.getElementById("meta-" + k).innerHTML = buildMeta(data[pi].items[ii], k);
  updateProg();
  saveState();
}

function toggleSec(pi) {
  var el = document.getElementById("sec-" + pi);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function copyText() {
  var lines = ["PROJECT FOLLOW-UP - " + todayStr(), ""];
  data.forEach(function(p, pi) {
    var dp = 0;
    p.items.forEach(function(_, ii){ if (S[pi+"-"+ii] && S[pi+"-"+ii].done) dp++; });
    lines.push(p.name.toUpperCase() + "  [" + dp + "/" + p.items.length + "]");
    lines.push("---------------------------------------------------");
    p.items.forEach(function(it, ii) {
      var st = S[pi+"-"+ii] || { done:false, dc:"", note:"" };
      var line = "  " + (st.done ? "[DONE]  " : "[ ]     ") + it.t;
      if (it.who) line += "  (" + it.who + ")";
      if (st.done && st.dc) {
        var d = daysBetween(it.da, st.dc);
        line += " | Added: " + (it.da || "?") + " | Closed: " + st.dc + (d !== null ? " (" + d + " days)" : "");
      } else if (it.da) {
        var d2 = daysBetween(it.da, null);
        line += " | Added: " + it.da + (d2 !== null ? " (" + d2 + " days open)" : "");
      }
      if (st.note) line += " | NOTE: " + st.note;
      lines.push(line);
    });
    lines.push("");
  });
  var txt = lines.join("\n");
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(flash).catch(function(){ fallback(txt); });
  } else { fallback(txt); }
}

function fallback(txt) {
  var ta = document.createElement("textarea");
  ta.value = txt;
  ta.style.cssText = "position:fixed;opacity:0;top:0;left:0;width:1px;height:1px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand("copy"); flash(); } catch(e) {}
  document.body.removeChild(ta);
}

function flash() {
  var b = document.getElementById("copybtn");
  b.textContent = "Copied!";
  setTimeout(function(){ b.textContent = "Copy as text"; }, 2000);
}

function resetAll() {
  if (!confirm("Reset ALL checkboxes and notes?")) return;
  data.forEach(function(p, pi) {
    p.items.forEach(function(it, ii) {
      var k = pi + "-" + ii;
      S[k] = { done:false, dc:"", note:"" };
      var cb = document.getElementById("cb-" + k);
      var tx = document.getElementById("tx-" + k);
      var m = document.getElementById("meta-" + k);
      if (cb) cb.className = "cb";
      if (tx) tx.className = "it";
      if (m) m.innerHTML = buildMeta(it, k);
      renderNote(k);
    });
  });
  updateProg();
  saveState();
}

var cont = document.getElementById("proj");
data.forEach(function(p, pi) {
  var div = document.createElement("div");
  div.className = "project";

  var header = document.createElement("div");
  header.className = "ph";
  header.innerHTML =
    "<div class='pi'>" + initials(p.name) + "</div>" +
    "<span class='pname'>" + escH(p.name) + "</span>" +
    "<span class='cnt' id='cnt-" + pi + "'>0/" + p.items.length + "</span>" +
    "<span style='font-size:11px;color:#999;margin-left:4px'>&#9660;</span>";
  header.addEventListener("click", (function(pi){ return function(){ toggleSec(pi); }; })(pi));

  var body = document.createElement("div");
  body.className = "iw";
  body.id = "sec-" + pi;

  p.items.forEach(function(it, ii) {
    var k = pi + "-" + ii;
    var isDone = S[k] && S[k].done;

    var row = document.createElement("div");
    row.className = "item";

    var cb = document.createElement("div");
    cb.className = "cb" + (isDone ? " on" : "");
    cb.id = "cb-" + k;
    cb.addEventListener("click", (function(pi,ii){ return function(){ toggle(pi,ii); }; })(pi,ii));

    var ib = document.createElement("div");
    ib.className = "ib";

    var tx = document.createElement("div");
    tx.className = "it" + (isDone ? " done" : "");
    tx.id = "tx-" + k;
    tx.textContent = it.t;
    tx.addEventListener("click", (function(pi,ii){ return function(){ toggle(pi,ii); }; })(pi,ii));

    var meta = document.createElement("div");
    meta.className = "meta";
    meta.id = "meta-" + k;
    meta.innerHTML = buildMeta(it, k);

    var noteDiv = document.createElement("div");
    noteDiv.id = "note-" + k;

    ib.appendChild(tx);
    ib.appendChild(meta);
    ib.appendChild(noteDiv);
    row.appendChild(cb);
    row.appendChild(ib);
    body.appendChild(row);
  });

  div.appendChild(header);
  div.appendChild(body);
  cont.appendChild(div);

  p.items.forEach(function(_, ii) { renderNote(pi + "-" + ii); });
});

loadState();
data.forEach(function(p, pi) {
  p.items.forEach(function(_, ii) { renderNote(pi + "-" + ii); });
});
updateProg();

</script>
